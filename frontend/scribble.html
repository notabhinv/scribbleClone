<body>

    <!-- CREATE -->
    <div id="createScreen">
        <h2>Create Room</h2>
        <input type="text" id="username" placeholder="Enter username">
        <button id="createBtn">Create Room</button>
    </div>

    <!-- JOIN -->
    <div id="joinScreen">
        <h2>Join Room</h2>
        <input type="text" id="joinUsername" placeholder="Enter username">
        <input type="text" id="joinRoomId" placeholder="Enter Room ID">
        <button id="joinBtn">Join Room</button>
    </div>

    <!-- GAME -->
   <div id="gameScreen" style="display: none;">

    <h2 id="roomId"></h2>

    <div style="display: flex; gap: 20px;">

        <!-- 👥 PLAYERS -->
        <div>
            <h3>Players</h3>
            <ul id="playersList"></ul>
        </div>
        <!-- 🎨 DRAWING BOARD -->
        <div>
            <h3>Canvas</h3>
            <canvas id="board" width="500" height="400"
                style="border:1px solid black;"></canvas>
        </div>


    </div>

    <!-- 💬 CHAT -->
    <div style="margin-top: 20px;">
        <h3>Chat</h3>

        <div id="chatBox"
             style="border:1px solid black; height:150px; overflow-y:auto;">
        </div>

        <input type="text" id="chatInput" placeholder="Type message">
        <button id="sendBtn">Send</button>
    </div>

    </div>

    <script src="script.js"></script>

</body>
